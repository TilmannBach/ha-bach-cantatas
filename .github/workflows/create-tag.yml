name: Create Tag and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  bump:
    name: Bump manifest version (conventional commits)
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      new_version: ${{ steps.bump.outputs.new_version }}
      tag_name: ${{ steps.bump.outputs.tag_name }}
    steps:
      - name: Checkout repository using git (no JavaScript actions)
        shell: bash
        env:
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "Cloning repository $REPO into $GITHUB_WORKSPACE"
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"
          # Fetch with tags and history so bump script can find latest tag
          git fetch --prune --tags origin "$REF" --depth=1 || git fetch --prune --tags origin --depth=1
          git checkout --force FETCH_HEAD

      - name: Ensure python3 is available
        shell: bash
        run: |
          python3 --version
          python3 -m pip --version

      - name: Run bump script
        id: bump
        run: |
          python3 .github/scripts/bump_manifest_version.py > bump_output.txt
          echo "bumped=$(grep -m1 '^bumped=' bump_output.txt | cut -d'=' -f2)" >> $GITHUB_OUTPUT
          echo "new_version=$(grep -m1 '^new_version=' bump_output.txt | cut -d'=' -f2)" >> $GITHUB_OUTPUT
          echo "tag_name=$(grep -m1 '^tag_name=' bump_output.txt | cut -d'=' -f2)" >> $GITHUB_OUTPUT

  hacs:
    name: HACS Action
    runs-on: ubuntu-latest
    needs: bump
    steps:
      - name: Checkout repository using git (no JavaScript actions)
        shell: bash
        env:
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "Cloning repository $REPO into $GITHUB_WORKSPACE"
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"
          git fetch --prune --tags origin "$REF" --depth=1 || git fetch --prune --tags origin --depth=1
          git checkout --force FETCH_HEAD

      - name: Run HACS Action
        uses: hacs/action@22.5.0
        with:
          category: integration

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    needs: bump
    steps:
      - name: Check for integrations and skip if none
        shell: bash
        run: |
          if [ ! -d "custom_components" ]; then
            echo "No integrations found; skipping hassfest."
            exit 0
          fi

      - name: Checkout repository using git (for hassfest)
        shell: bash
        env:
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "Cloning repository $REPO into $GITHUB_WORKSPACE"
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"
          git fetch --prune --tags origin "$REF" --depth=1 || git fetch --prune --tags origin --depth=1
          git checkout --force FETCH_HEAD

      - name: Run hassfest action
        uses: home-assistant/actions/hassfest@master

  release:
    name: Tag and Release
    needs: [bump, hacs, hassfest]
    if: needs.bump.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository using git (no JavaScript actions)
        shell: bash
        env:
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "Cloning repository $REPO into $GITHUB_WORKSPACE"
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"
          git fetch --prune --tags origin "$REF" --depth=1 || git fetch --prune --tags origin --depth=1
          git checkout --force FETCH_HEAD

      - name: Create Release from bump tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag_name }}
          name: Release ${{ needs.bump.outputs.tag_name }}
          generate_release_notes: true