name: Create Tag and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump:
    name: Bump manifest version (conventional commits)
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      new_version: ${{ steps.bump.outputs.new_version }}
      tag_name: ${{ steps.bump.outputs.tag_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Run bump script
        id: bump
        run: |
          python .github/scripts/bump_manifest_version.py > bump_output.txt
          echo "bumped=$(grep -m1 '^bumped=' bump_output.txt | cut -d'=' -f2)" >> $GITHUB_OUTPUT
          echo "new_version=$(grep -m1 '^new_version=' bump_output.txt | cut -d'=' -f2)" >> $GITHUB_OUTPUT
          echo "tag_name=$(grep -m1 '^tag_name=' bump_output.txt | cut -d'=' -f2)" >> $GITHUB_OUTPUT

  hacs:
    name: HACS Action
    runs-on: ubuntu-latest
    needs: bump
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run HACS Action
        uses: hacs/action@22.5.0

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    needs: bump
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Check for integrations and skip if none
        shell: bash
        run: |
          if [ ! -d "custom_components" ]; then
            echo "No integrations found; skipping hassfest."
            exit 0
          fi

      - name: Install hassfest
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install hassfest

      - name: Run hassfest
        shell: bash
        run: |
          # Run hassfest against repository (it will scan for integrations)
          hassfest || true

  release:
    name: Tag and Release
    needs: [bump, hacs, hassfest]
    if: needs.bump.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release from bump tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag_name }}
          name: Release ${{ needs.bump.outputs.tag_name }}
          generate_release_notes: true